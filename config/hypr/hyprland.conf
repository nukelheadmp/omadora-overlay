# Learn how to configure Hyprland: https://wiki.hypr.land/Configuring/

env = SSH_AUTH_SOCK,/run/user/1000/ssh-agent.socket

# Use Omadora defaults (but don't edit these directly!)
source = ~/.local/share/omadora/default/hypr/autostart.conf
source = ~/.local/share/omadora/default/hypr/bindings/media.conf
source = ~/.local/share/omadora/default/hypr/bindings/tiling.conf
source = ~/.local/share/omadora/default/hypr/bindings/utilities.conf
source = ~/.local/share/omadora/default/hypr/looknfeel.conf
source = ~/.local/share/omadora/default/hypr/input.conf
source = ~/.local/share/omadora/default/hypr/windows.conf
source = ~/.config/omadora/current/theme/hyprland.conf

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/windows.conf

# Toggle config flags dynamically
source = ~/.local/state/omadora/toggles/hypr/*.conf
