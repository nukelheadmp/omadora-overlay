"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
success_symbol = "[ÔŁ»](bold cyan)"
error_symbol = "[´Ĺž](bold red)"

[directory]
read_only = " ˇ░îż"
truncation_length = 2
truncation_symbol = "ÔÇŽ/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "´Éś "
format = "[$symbol$branch]($style) "
style = "italic blue"

[git_commit]
tag_symbol = ' ´Éĺ '

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
modified = "*"
staged = "+"
untracked = "?"
conflicted = "!"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçĽ"
deleted = ""
renamed = ""
stashed = ""
